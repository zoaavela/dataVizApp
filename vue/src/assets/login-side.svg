<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200">
    <rect width="100%" height="100%" fill="#0b0c10"/>

    <defs>
        <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#16191d" stroke-width="2"/>
        </pattern>
        <radialGradient id="glow" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#10b981" stop-opacity="0.10"/>
            <stop offset="100%" stop-color="#0b0c10" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="100%" height="100%" fill="url(#grid)" />
    <rect width="100%" height="100%" fill="url(#glow)" />

    <path d="M-100,400 Q 200,300 400,600 T 900,500" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4" />
    <path d="M-100,450 Q 250,350 450,650 T 900,550" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.2" />
    <path d="M-100,500 Q 300,400 500,700 T 900,600" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.1" />

    <g fill="#10b981">
        <circle cx="280" cy="403" r="5" />
        <circle cx="400" cy="600" r="7" />
        <circle cx="680" cy="545" r="4" />
        <circle cx="450" cy="650" r="5" opacity="0.6"/>
        <circle cx="300" cy="450" r="3" opacity="0.4"/>
    </g>

    <g fill="#10b981" opacity="0.5">
        <rect x="150" y="800" width="4" height="60" rx="2" />
        <rect x="170" y="820" width="4" height="40" rx="2" opacity="0.7"/>
        <rect x="190" y="780" width="4" height="80" rx="2" opacity="0.4"/>
        <rect x="210" y="840" width="4" height="20" rx="2" opacity="0.9"/>
        <rect x="230" y="790" width="4" height="50" rx="2" opacity="0.5"/>
    </g>
</svg>