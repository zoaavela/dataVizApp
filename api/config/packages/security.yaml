# config/packages/security.yaml
security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # 1. Firewall spécifique pour l'API (Ordre important : doit être AVANT main)
        api:
            pattern: ^/api
            stateless: true   # Désactive PHPSESSID et les cookies pour l'API
            
            # Gestion du Login JSON pour récupérer le Token
            json_login:
                check_path: api_login
                username_path: email
                password_path: password
            
            # Active la lecture du Token JWT (Bearer Token)
            jwt: ~

        # 2. Firewall principal (par défaut)
        main:
            lazy: true
            provider: app_user_provider
            
            # Optionnel : permet aussi le logout classique
            logout:
                path: app_logout

    # --- RÈGLES D'ACCÈS ---
    # Symfony vérifie ces règles dans l'ordre (du plus précis au plus général)
    access_control:
        # Routes publiques (nécessaires pour les invités et la connexion)
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        
        # On autorise l'accès aux données de la carte en public pour le mode "Invité"
        # Adapte le path selon tes routes (ex: /api/territoires)
        - { path: ^/api/carte, roles: PUBLIC_ACCESS } 

        # Routes protégées
        - { path: ^/api/profile, roles: ROLE_USER }
        - { path: ^/api/admin, roles: ROLE_ADMIN }

# Configuration spécifique pour les tests
when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10